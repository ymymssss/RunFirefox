name: CI

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Debug Info
        run: |
          echo "github.ref: ${{ github.ref }}"
          echo "github.event_name: ${{ github.event_name }}"
        shell: bash

      - uses: actions/checkout@v3

      - name: Setup AutoIt
        shell: pwsh
        run: |
          choco install autoit -y --no-progress
          echo "C:\Program Files (x86)\AutoIt3" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#*\/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Update the version
        shell: bash
        run: |
          sed -i "s/#AutoIt3Wrapper_Res_Fileversion.*/#AutoIt3Wrapper_Res_Fileversion=${{ steps.get_version.outputs.VERSION }}.0/" RunFirefox.au3
          sed -i "s/Global Const \$AppVersion.*/Global Const \$AppVersion = \"${{ steps.get_version.outputs.VERSION }}\"/" RunFirefox.au3

      - name: Generate scripts for all icons
        shell: bash
        run: |
          for icon in icons/*.ico; do
            basename=$(basename "$icon" .ico)
            # 排除原始Firefox图标
            if [ "$basename" != "Firefox" ]; then
              cp RunFirefox.au3 "Run${basename}.au3"
              sed -i "s/Firefox.ico/${basename}.ico/" "Run${basename}.au3"
              sed -i "s/Global Const \$CustomArch.*/Global Const \$CustomArch = \"Run${basename}\"/" "Run${basename}.au3"
              sed -i "s/RunFirefox.exe/Run${basename}.exe/" "Run${basename}.au3"
              sed -i "s/RunFirefox_x64.exe/Run${basename}_x64.exe/" "Run${basename}.au3"
            fi
          done

      - name: Verify AutoIt install
        shell: pwsh
        run: |
          Write-Host "=== AutoIt3 dir ==="
          Get-ChildItem "${env:ProgramFiles(x86)}\AutoIt3" -ErrorAction SilentlyContinue | Select-Object Name, Length
          Write-Host "=== Looking for aut2exe ==="
          $aut2exe = Get-ChildItem "${env:ProgramFiles(x86)}\AutoIt3" -Recurse -Filter "Aut2Exe*" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($aut2exe) { Write-Host "Found: $($aut2exe.FullName)" } else { Write-Host "NOT FOUND" }

      - name: Build scripts
        shell: pwsh
        run: |
          $autoitDir = "${env:ProgramFiles(x86)}\AutoIt3"
          $aut2exe = Get-ChildItem "$autoitDir\Aut2Exe\Aut2Exe.exe" -ErrorAction SilentlyContinue
          if (-not $aut2exe) {
            Write-Host "Not in Aut2Exe subdir, searching recursively..."
            $aut2exe = Get-ChildItem $autoitDir -Recurse -Filter "Aut2Exe.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $aut2exe) {
            Write-Error "aut2exe not found!"
            exit 1
          }
          Write-Host "Using: $($aut2exe.FullName)"
          Write-Host "PWD: $(Get-Location)"
          Write-Host "AU3 files:"
          Get-ChildItem *.au3 | ForEach-Object { Write-Host "  $($_.Name)" }

          $au3Files = Get-ChildItem *.au3
          if (-not $au3Files) {
            Write-Error "No .au3 files found!"
            exit 1
          }

          $anyFailure = $false

          foreach ($f in $au3Files) {
            $base = $f.BaseName
            $scriptName = $f.Name
            $aut2exePath = $aut2exe.FullName

            $icon_line = Select-String -Path $scriptName -Pattern '#AutoIt3Wrapper_Icon=' -SimpleMatch | Select-Object -First 1
            $icon = ''
            if ($icon_line) {
              $icon = ($icon_line.Line -replace '.*#AutoIt3Wrapper_Icon=', '').Trim()
            }

            Write-Host "=== Building $scriptName (base=$base icon=$icon) ==="

            # Build 32-bit
            $out32 = "${base}.exe"
            Write-Host "  [32-bit]"
            if ($icon -and (Test-Path $icon)) {
              cmd /c "`"$aut2exePath`" /in `"$scriptName`" /out `"$out32`" /x86 /unicode /nopack /icon `"$icon`"" 2>&1
            } else {
              cmd /c "`"$aut2exePath`" /in `"$scriptName`" /out `"$out32`" /x86 /unicode /nopack" 2>&1
            }
            if ($LASTEXITCODE -ne 0 -or -not (Test-Path $out32)) {
              Write-Host "  ERROR: 32-bit build failed (exit=$LASTEXITCODE, exists=$(Test-Path $out32))"
              $anyFailure = $true
            } else {
              Write-Host "  OK: $out32 ($((Get-Item $out32).Length) bytes)"
            }

            # Build 64-bit
            $out64 = "${base}_x64.exe"
            Write-Host "  [64-bit]"
            if ($icon -and (Test-Path $icon)) {
              cmd /c "`"$aut2exePath`" /in `"$scriptName`" /out `"$out64`" /x64 /unicode /nopack /icon `"$icon`"" 2>&1
            } else {
              cmd /c "`"$aut2exePath`" /in `"$scriptName`" /out `"$out64`" /x64 /unicode /nopack" 2>&1
            }
            if ($LASTEXITCODE -ne 0 -or -not (Test-Path $out64)) {
              Write-Host "  ERROR: 64-bit build failed (exit=$LASTEXITCODE, exists=$(Test-Path $out64))"
              $anyFailure = $true
            } else {
              Write-Host "  OK: $out64 ($((Get-Item $out64).Length) bytes)"
            }
          }

          Write-Host "=== Build complete. Output: ==="
          $exeFiles = Get-ChildItem *.exe -ErrorAction SilentlyContinue
          if ($exeFiles) {
            $exeFiles | ForEach-Object { Write-Host "$($_.Name) ($($_.Length) bytes)" }
          } else {
            Write-Error "ERROR: No exe files produced!"
            exit 1
          }

          if ($anyFailure) {
            Write-Host "WARNING: Some builds failed but continuing..."
          }

      - name: Check the output
        shell: bash
        run: |
          ls -l

      - name: Package the binaries
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          Get-ChildItem Run*.exe | ForEach-Object {
            $exe = $_.Name
            if ($exe -match '^(.+)_x64\.exe$') {
              $base = $Matches[1]
              $arch = "_x64"
            } else {
              $base = $exe -replace '\.exe$', ''
              $arch = ""
            }
            $zipName = "${base}_${version}${arch}.zip"
            Write-Host "Packaging $exe -> $zipName"
            Compress-Archive -Path $exe -DestinationPath $zipName -Force
          }
          Write-Host "Packaging complete. ZIP files:"
          Get-ChildItem *.zip | ForEach-Object { Write-Host "$($_.Name) ($($_.Length) bytes)" }

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          echo 'changes<<EOF' >> $GITHUB_OUTPUT
          git log --oneline $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo HEAD~5)..HEAD 2>/dev/null || echo "Initial release" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Create release and upload assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $repo = "${{ github.repository }}"
          $token = $env:GITHUB_TOKEN
          $baseUri = "https://api.github.com/repos/$repo"

          Write-Host "=== Checking for zip files ==="
          $zipFiles = Get-ChildItem *.zip -ErrorAction SilentlyContinue
          if (-not $zipFiles) {
            Write-Error "No zip files found! Running dir for debug:"
            Get-ChildItem | ForEach-Object { Write-Host $_.Name }
            exit 1
          }
          Write-Host "Found $($zipFiles.Count) zip files:"
          $zipFiles | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }

          Write-Host "=== Checking for exe files ==="
          Get-ChildItem *.exe -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }

          Write-Host "=== Deleting existing release ==="
          try {
            $existing = Invoke-RestMethod -Uri "$baseUri/releases/tags/v$version" -Method Get -Headers @{Authorization="Bearer $token"} -ErrorAction SilentlyContinue
            if ($existing) {
              Invoke-RestMethod -Uri "$baseUri/releases/$($existing.id)" -Method Delete -Headers @{Authorization="Bearer $token"}
              Write-Host "Deleted existing release"
            }
          } catch {
            Write-Host "No existing release (HTTP $($_.Exception.Response.StatusCode.value__))"
          }

          Write-Host "=== Creating release ==="
          $changelog = @"
          ${{ steps.changelog.outputs.changes }}
          "@
          $releaseBody = @{
            tag_name = "v$version"
            name = "v$version"
            body = $changelog
            draft = $false
            prerelease = $false
          } | ConvertTo-Json

          $release = Invoke-RestMethod -Uri "$baseUri/releases" -Method Post -Headers @{
            Authorization = "Bearer $token"
            Accept = "application/vnd.github.v3+json"
          } -Body $releaseBody -ContentType "application/json"

          Write-Host "Release created: $($release.html_url)"

          Write-Host "=== Uploading assets ==="
          $uploadUri = $release.upload_url -replace '\{[^}]+\}', ''
          foreach ($zip in $zipFiles) {
            Write-Host "Uploading $($zip.Name)..."
            $uploadUrl = "${uploadUri}?name=$($zip.Name)"
            Invoke-RestMethod -Uri $uploadUrl -Method Post -Headers @{
              Authorization = "Bearer $token"
              Accept = "application/vnd.github.v3+json"
            } -ContentType "application/zip" -InFile $zip.FullName
            Write-Host "  Uploaded $($zip.Name)"
          }

          Write-Host "=== Done ==="

      - uses: EndBug/add-and-commit@v9
        with:
          push: origin HEAD:master
          add: "*.txt RunFirefox.au3"
          fetch: true
          message: "Bump update information"