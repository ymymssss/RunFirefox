name: CI

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Debug Info
        run: |
          echo "github.ref: ${{ github.ref }}"
          echo "github.event_name: ${{ github.event_name }}"
        shell: bash

      - uses: actions/checkout@v3

      - name: Setup AutoIt
        shell: pwsh
        run: |
          choco install autoit -y --no-progress
          echo "C:\Program Files (x86)\AutoIt3" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#*\/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Update the version
        shell: bash
        run: |
          sed -i "s/#AutoIt3Wrapper_Res_Fileversion.*/#AutoIt3Wrapper_Res_Fileversion=${{ steps.get_version.outputs.VERSION }}.0/" RunFirefox.au3
          sed -i "s/Global Const \$AppVersion.*/Global Const \$AppVersion = \"${{ steps.get_version.outputs.VERSION }}\"/" RunFirefox.au3

      - name: Generate scripts for all icons
        shell: bash
        run: |
          for icon in icons/*.ico; do
            basename=$(basename "$icon" .ico)
            # 排除原始Firefox图标
            if [ "$basename" != "Firefox" ]; then
              cp RunFirefox.au3 "Run${basename}.au3"
              sed -i "s/Firefox.ico/${basename}.ico/" "Run${basename}.au3"
              sed -i "s/Global Const \$CustomArch.*/Global Const \$CustomArch = \"Run${basename}\"/" "Run${basename}.au3"
              sed -i "s/RunFirefox.exe/Run${basename}.exe/" "Run${basename}.au3"
              sed -i "s/RunFirefox_x64.exe/Run${basename}_x64.exe/" "Run${basename}.au3"
            fi
          done

      - name: Verify AutoIt install
        shell: pwsh
        run: |
          Write-Host "=== AutoIt3 dir ==="
          Get-ChildItem "${env:ProgramFiles(x86)}\AutoIt3" -ErrorAction SilentlyContinue | Select-Object Name, Length
          Write-Host "=== Looking for aut2exe ==="
          $aut2exe = Get-ChildItem "${env:ProgramFiles(x86)}\AutoIt3" -Recurse -Filter "Aut2Exe*" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($aut2exe) { Write-Host "Found: $($aut2exe.FullName)" } else { Write-Host "NOT FOUND" }

      - name: Build scripts
        shell: bash
        run: |
          AUT2EXE=$(find "/c/Program Files (x86)/AutoIt3/" -iname "aut2exe*" -type f 2>/dev/null | head -1)
          if [ -z "$AUT2EXE" ]; then
            echo "ERROR: aut2exe not found!"
            exit 1
          fi
          echo "Using: $AUT2EXE"
          echo "PWD: $(pwd)"
          echo "AU3 files:"
          ls *.au3

          for f in *.au3; do
            base="${f%.au3}"
            icon=$(sed -n 's/.*#AutoIt3Wrapper_Icon=//p' "$f" | head -1)
            echo "=== Building $f (base=$base icon=$icon) ==="

            if [ -n "$icon" ] && [ -f "$icon" ]; then
              echo "  [32-bit with icon]"
              "$AUT2EXE" /in "$f" /out "${base}.exe" /x86 /unicode /icon "$icon" || echo "WARN: 32-bit build failed (exit $?)"
              echo "  [64-bit with icon]"
              "$AUT2EXE" /in "$f" /out "${base}_x64.exe" /x64 /unicode /icon "$icon" || echo "WARN: 64-bit build failed (exit $?)"
            else
              echo "  [32-bit no icon]"
              "$AUT2EXE" /in "$f" /out "${base}.exe" /x86 /unicode || echo "WARN: 32-bit build failed (exit $?)"
              echo "  [64-bit no icon]"
              "$AUT2EXE" /in "$f" /out "${base}_x64.exe" /x64 /unicode || echo "WARN: 64-bit build failed (exit $?)"
            fi
          done

          echo "=== Build complete. Output: ==="
          ls -la *.exe 2>/dev/null || echo "No exe files produced"

      - name: Check the output
        shell: bash
        run: |
          ls -l

      - name: Package the binaries
        shell: bash
        run: |
          # 仅处理以Run开头的exe文件
          for exe in Run*.exe; do
            # 提取基础名称和架构标识
            if [[ "$exe" == *_x64.exe ]]; then
              basename="${exe%_x64.exe}"
              arch="_x64"
            else
              basename="${exe%.exe}"
              arch=""
            fi
            
            # 生成最终文件名
            zip_name="${basename}_${{ steps.get_version.outputs.VERSION }}${arch}.zip"
            
            # 打包命令
            7z a -tzip "$zip_name" "$exe"
          done

      - uses: xresloader/upload-to-github-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          file: "*.zip"
          tags: true
          draft: false
          overwrite: true

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          echo 'changes<<EOF' >> $GITHUB_OUTPUT
          git log --oneline $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo HEAD~5)..HEAD 2>/dev/null || echo "Initial release" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Update release
        uses: ColinPitrat/update-release@v1.0.1
        with:
          files: "README.md"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.changes }}

      - uses: EndBug/add-and-commit@v9
        with:
          push: origin HEAD:master
          add: "*.txt RunFirefox.au3"
          fetch: true
          message: "Bump update information"