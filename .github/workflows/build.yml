name: CI

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Debug Info
        run: |
          echo "github.ref: ${{ github.ref }}"
          echo "github.event_name: ${{ github.event_name }}"
        shell: bash

      - uses: actions/checkout@v3

      - name: Setup AutoIt
        shell: pwsh
        run: |
          choco install autoit -y --no-progress
          echo "C:\Program Files (x86)\AutoIt3" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#*\/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Update the version
        shell: bash
        run: |
          sed -i "s/#AutoIt3Wrapper_Res_Fileversion.*/#AutoIt3Wrapper_Res_Fileversion=${{ steps.get_version.outputs.VERSION }}.0/" RunFirefox.au3
          sed -i "s/Global Const \$AppVersion.*/Global Const \$AppVersion = \"${{ steps.get_version.outputs.VERSION }}\"/" RunFirefox.au3

      - name: Generate scripts for all icons
        shell: bash
        run: |
          for icon in icons/*.ico; do
            basename=$(basename "$icon" .ico)
            # 排除原始Firefox图标
            if [ "$basename" != "Firefox" ]; then
              cp RunFirefox.au3 "Run${basename}.au3"
              sed -i "s/Firefox.ico/${basename}.ico/" "Run${basename}.au3"
              sed -i "s/Global Const \$CustomArch.*/Global Const \$CustomArch = \"Run${basename}\"/" "Run${basename}.au3"
              sed -i "s/RunFirefox.exe/Run${basename}.exe/" "Run${basename}.au3"
              sed -i "s/RunFirefox_x64.exe/Run${basename}_x64.exe/" "Run${basename}.au3"
            fi
          done

      - name: Verify AutoIt install
        shell: pwsh
        run: |
          Write-Host "=== AutoIt3 dir ==="
          Get-ChildItem "${env:ProgramFiles(x86)}\AutoIt3" -ErrorAction SilentlyContinue | Select-Object Name, Length
          Write-Host "=== Looking for aut2exe ==="
          $aut2exe = Get-ChildItem "${env:ProgramFiles(x86)}\AutoIt3" -Recurse -Filter "Aut2Exe*" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($aut2exe) { Write-Host "Found: $($aut2exe.FullName)" } else { Write-Host "NOT FOUND" }

      - name: Build scripts
        shell: pwsh
        run: |
          $autoitDir = "${env:ProgramFiles(x86)}\AutoIt3"
          $aut2exe = Get-ChildItem "$autoitDir\Aut2Exe\Aut2Exe.exe" -ErrorAction SilentlyContinue
          if (-not $aut2exe) {
            Write-Host "Not in Aut2Exe subdir, searching recursively..."
            $aut2exe = Get-ChildItem $autoitDir -Recurse -Filter "Aut2Exe.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $aut2exe) {
            Write-Error "aut2exe not found!"
            exit 1
          }
          Write-Host "Using: $($aut2exe.FullName)"
          Write-Host "PWD: $(Get-Location)"
          Write-Host "AU3 files:"
          Get-ChildItem *.au3 | ForEach-Object { Write-Host "  $($_.Name)" }

          $au3Files = Get-ChildItem *.au3
          if (-not $au3Files) {
            Write-Error "No .au3 files found!"
            exit 1
          }

          foreach ($f in $au3Files) {
            $base = $f.BaseName
            $scriptName = $f.Name

            $icon_line = Select-String -Path $scriptName -Pattern '#AutoIt3Wrapper_Icon=' -SimpleMatch | Select-Object -First 1
            $icon = ''
            if ($icon_line) {
              $icon = ($icon_line.Line -replace '.*#AutoIt3Wrapper_Icon=', '').Trim()
            }

            Write-Host "=== Building $scriptName (base=$base icon=$icon) ==="

            $aut2exePath = $aut2exe.FullName

            if ($icon -and (Test-Path $icon)) {
              Write-Host "  [32-bit with icon]"
              & $aut2exePath /in $scriptName /out "${base}.exe" /x86 /unicode /icon $icon 2>&1
              if ($LASTEXITCODE -ne 0) { Write-Host "WARN: 32-bit build failed (exit $LASTEXITCODE)" }

              Write-Host "  [64-bit with icon]"
              & $aut2exePath /in $scriptName /out "${base}_x64.exe" /x64 /unicode /icon $icon 2>&1
              if ($LASTEXITCODE -ne 0) { Write-Host "WARN: 64-bit build failed (exit $LASTEXITCODE)" }
            } else {
              Write-Host "  [32-bit no icon]"
              & $aut2exePath /in $scriptName /out "${base}.exe" /x86 /unicode 2>&1
              if ($LASTEXITCODE -ne 0) { Write-Host "WARN: 32-bit build failed (exit $LASTEXITCODE)" }

              Write-Host "  [64-bit no icon]"
              & $aut2exePath /in $scriptName /out "${base}_x64.exe" /x64 /unicode 2>&1
              if ($LASTEXITCODE -ne 0) { Write-Host "WARN: 64-bit build failed (exit $LASTEXITCODE)" }
            }
          }

          Write-Host "=== Build complete. Output: ==="
          $exeFiles = Get-ChildItem *.exe -ErrorAction SilentlyContinue
          if ($exeFiles) {
            $exeFiles | ForEach-Object { Write-Host "$($_.Name) ($($_.Length) bytes)" }
          } else {
            Write-Host "No exe files produced!"
          }

      - name: Check the output
        shell: bash
        run: |
          ls -l

      - name: Package the binaries
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          Get-ChildItem Run*.exe | ForEach-Object {
            $exe = $_.Name
            if ($exe -match '^(.+)_x64\.exe$') {
              $base = $Matches[1]
              $arch = "_x64"
            } else {
              $base = $exe -replace '\.exe$', ''
              $arch = ""
            }
            $zipName = "${base}_${version}${arch}.zip"
            Write-Host "Packaging $exe -> $zipName"
            Compress-Archive -Path $exe -DestinationPath $zipName -Force
          }
          Write-Host "Packaging complete. ZIP files:"
          Get-ChildItem *.zip | ForEach-Object { Write-Host "$($_.Name) ($($_.Length) bytes)" }

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          echo 'changes<<EOF' >> $GITHUB_OUTPUT
          git log --oneline $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo HEAD~5)..HEAD 2>/dev/null || echo "Initial release" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v1
        with:
          files: "*.zip"
          body: ${{ steps.changelog.outputs.changes }}
          draft: false

      - uses: EndBug/add-and-commit@v9
        with:
          push: origin HEAD:master
          add: "*.txt RunFirefox.au3"
          fetch: true
          message: "Bump update information"