name: CI

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Debug Info
        shell: bash
        run: |
          echo "github.ref: ${{ github.ref }}"
          echo "github.event_name: ${{ github.event_name }}"

      - uses: actions/checkout@v3

      - name: Setup AutoIt
        shell: pwsh
        run: |
          choco install autoit -y --no-progress
          echo "C:\Program Files (x86)\AutoIt3" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get the version
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#*\/v}" >> $GITHUB_OUTPUT

      - name: Update the version
        shell: bash
        run: |
          sed -i "s/#AutoIt3Wrapper_Res_Fileversion.*/#AutoIt3Wrapper_Res_Fileversion=${{ steps.get_version.outputs.VERSION }}.0/" RunFirefox.au3
          sed -i "s/Global Const \$AppVersion.*/Global Const \$AppVersion = \"${{ steps.get_version.outputs.VERSION }}\"/" RunFirefox.au3

      - name: Generate scripts for all icons
        shell: bash
        run: |
          for icon in icons/*.ico; do
            basename=$(basename "$icon" .ico)
            if [ "$basename" != "Firefox" ]; then
              cp RunFirefox.au3 "Run${basename}.au3"
              sed -i "s/Firefox.ico/${basename}.ico/" "Run${basename}.au3"
              sed -i "s/Global Const \$CustomArch.*/Global Const \$CustomArch = \"Run${basename}\"/" "Run${basename}.au3"
              sed -i "s/RunFirefox.exe/Run${basename}.exe/" "Run${basename}.au3"
              sed -i "s/RunFirefox_x64.exe/Run${basename}_x64.exe/" "Run${basename}.au3"
            fi
          done

      - name: Build, package, and release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $repo = "${{ github.repository }}"
          $token = $env:GITHUB_TOKEN
          $ErrorActionPreference = "Continue"

          # === Find AutoIt ===
          $autoitDir = "${env:ProgramFiles(x86)}\AutoIt3"
          $aut2exe = Get-ChildItem "$autoitDir\Aut2Exe\Aut2Exe.exe" -ErrorAction SilentlyContinue
          if (-not $aut2exe) {
            $aut2exe = Get-ChildItem $autoitDir -Recurse -Filter "Aut2Exe.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $aut2exe) { Write-Error "aut2exe not found!"; exit 1 }
          Write-Host "Using: $($aut2exe.FullName)"
          $aut2exePath = $aut2exe.FullName

          # === Build all AU3 scripts ===
          $au3Files = Get-ChildItem *.au3
          if (-not $au3Files) { Write-Error "No .au3 files!"; exit 1 }

          foreach ($f in $au3Files) {
            $base = $f.BaseName
            $sn = $f.Name
            $icon = ''
            $il = Select-String -Path $sn -Pattern '#AutoIt3Wrapper_Icon=' -SimpleMatch | Select-Object -First 1
            if ($il) { $icon = ($il.Line -replace '.*#AutoIt3Wrapper_Icon=', '').Trim() }

            Write-Host "Build: $sn icon=$icon"
            foreach ($arch in @("x86","x64")) {
              $out = if ($arch -eq "x86") { "${base}.exe" } else { "${base}_x64.exe" }
              if ($icon -and (Test-Path $icon)) {
                & $aut2exePath /in $sn /out $out /$arch /unicode /nopack /icon $icon 2>&1
              } else {
                & $aut2exePath /in $sn /out $out /$arch /unicode /nopack 2>&1
              }
              if ((Test-Path $out) -and ((Get-Item $out).Length -gt 1024)) {
                Write-Host "  OK: $out ($((Get-Item $out).Length) bytes)"
              } else {
                Write-Host "  FAIL: $out not created or too small!"
              }
            }
          }

          # === Package into ZIPs ===
          Write-Host "=== Packaging ==="
          $exeFiles = @(Get-ChildItem Run*.exe -ErrorAction SilentlyContinue)
          if ($exeFiles.Count -eq 0) {
            Write-Error "No Run*.exe files found!"
            Get-ChildItem | ForEach-Object { Write-Host "File: $($_.Name)" }
            exit 1
          }
          Write-Host "Found $($exeFiles.Count) exe files"

          foreach ($exe in $exeFiles) {
            $name = $exe.Name
            if ($name -match '^(.+)_x64\.exe$') {
              $zipName = "$($Matches[1])_${version}_x64.zip"
            } else {
              $baseName = $name -replace '\.exe$', ''
              $zipName = "${baseName}_${version}.zip"
            }
            Write-Host "Zip: $name -> $zipName"
            Compress-Archive -Path $name -DestinationPath $zipName -Force
          }

          Write-Host "=== ZIP files ==="
          $zipFiles = @(Get-ChildItem *.zip -ErrorAction SilentlyContinue)
          if ($zipFiles.Count -eq 0) {
            Write-Error "No zip files created!"
            exit 1
          }
          $zipFiles | ForEach-Object { Write-Host "$($_.Name) ($($_.Length) bytes)" }

          # === Create GitHub Release ===
          Write-Host "=== Creating release ==="
          $body = @{tag_name="v$version"; name="v$version"; body=""; draft=$false; prerelease=$false} | ConvertTo-Json
          $headers = @{Authorization="Bearer $token"; Accept="application/vnd.github.v3+json"}

          # Delete existing release
          try {
            $rel = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/tags/v$version" -Headers $headers -Method Get
            Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/$($rel.id)" -Headers $headers -Method Delete
            Write-Host "Deleted existing release"
          } catch { Write-Host "No existing release" }

          # Create release
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases" -Method Post -Headers $headers -Body $body -ContentType "application/json"
          Write-Host "Release: $($release.html_url)"

          # Upload assets
          $uploadBase = $release.upload_url -replace '\{[^}]+\}', ''
          foreach ($zip in $zipFiles) {
            Write-Host "Upload: $($zip.Name)"
            Invoke-RestMethod -Uri "${uploadBase}?name=$($zip.Name)" -Method Post -Headers @{
              Authorization = "Bearer $token"
              "Content-Type" = "application/zip"
            } -InFile $zip.FullName
          }
          Write-Host "=== Done ==="

      - uses: EndBug/add-and-commit@v9
        with:
          push: origin HEAD:master
          add: "*.txt RunFirefox.au3"
          fetch: true
          message: "Bump update information"
