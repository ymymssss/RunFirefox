name: CI

on:
  push:
    branches: [master]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Setup AutoIt
        shell: pwsh
        run: |
          choco install autoit -y --no-progress
          echo "C:\Program Files (x86)\AutoIt3" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get the version
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#*\/v}" >> $GITHUB_OUTPUT

      - name: Build
        shell: pwsh
        run: |
          $log = [System.Text.StringBuilder]::new()
          function log($msg) { Write-Host $msg; [void]$log.AppendLine($msg) }

          $version = "${{ steps.get_version.outputs.VERSION }}"
          $autoitDir = "${env:ProgramFiles(x86)}\AutoIt3"
          $aut2exe = Get-ChildItem "$autoitDir\Aut2Exe\Aut2Exe.exe" -ErrorAction SilentlyContinue
          if (-not $aut2exe) { log "ERROR: aut2exe not found!"; exit 1 }
          log "aut2exe path: $($aut2exe.FullName)"
          log "aut2exe exists: $(Test-Path $aut2exe.FullName)"
          log "aut2exe size: $($aut2exe.Length) bytes"

          function Run-Aut2Exe($inFile, $outFile, $arch, $iconFile) {
            $args = "/in `"$inFile`" /out `"$outFile`" /$arch /unicode"
            if ($iconFile -and (Test-Path $iconFile)) {
              $args += " /icon `"$iconFile`""
            }
            log "  Command: $($aut2exe.FullName) $args"

            $psi = New-Object System.Diagnostics.ProcessStartInfo
            $psi.FileName = $aut2exe.FullName
            $psi.Arguments = $args
            $psi.UseShellExecute = $false
            $psi.RedirectStandardOutput = $true
            $psi.RedirectStandardError = $true
            $psi.CreateNoWindow = $true
            $psi.WorkingDirectory = (Get-Location).Path

            try {
              $proc = [System.Diagnostics.Process]::Start($psi)
              $stdout = $proc.StandardOutput.ReadToEnd()
              $stderr = $proc.StandardError.ReadToEnd()
              $proc.WaitForExit(60000)
              log "  stdout: $stdout"
              log "  stderr: $stderr"
              log "  exit=$($proc.ExitCode), exists=$(Test-Path $outFile), size=$((Get-Item $outFile -ErrorAction SilentlyContinue).Length)"
            } catch {
              log "  EXCEPTION: $_"
            }
          }

          # Test 1: Hello World
          log "`n=== Test 1: Hello World ==="
          Set-Content -Path "test_hello.au3" -Value "MsgBox(0, '', 'Hello')"
          Run-Aut2Exe "test_hello.au3" "test_hello.exe" "x86"

          # Test 2: With Crypt include
          log "`n=== Test 2: With Crypt.au3 ==="
          Set-Content -Path "test_crypt.au3" -Value "#include <Crypt.au3>`nMsgBox(0,'','test')"
          Run-Aut2Exe "test_crypt.au3" "test_crypt.exe" "x86"

          # Test 3: Real RunFirefox (32-bit)
          log "`n=== Test 3: RunFirefox.au3 x86 ==="
          Run-Aut2Exe "RunFirefox.au3" "RunFirefox.exe" "x86" "icons\Firefox.ico"

          # Test 4: Real RunFirefox (64-bit)
          log "`n=== Test 4: RunFirefox.au3 x64 ==="
          Run-Aut2Exe "RunFirefox.au3" "RunFirefox_x64.exe" "x64" "icons\Firefox.ico"

          # Save log
          $log.ToString() | Out-File -FilePath build.log -Encoding UTF8

          # Package Run*.exe + log
          log "`n=== Packaging ==="
          $exeFiles = @(Get-ChildItem Run*.exe -ErrorAction SilentlyContinue)
          log "Run*.exe files: $($exeFiles.Count)"
          foreach ($exe in $exeFiles) {
            $name = $exe.Name
            if ($name -match '_x64') { $suffix = "_x64" } else { $suffix = "" }
            $baseName = $name -replace '_x64\.exe$','' -replace '\.exe$',''
            $zipName = "${baseName}_${version}${suffix}.zip"
            log "Zip: $name -> $zipName"
            Compress-Archive -Path $name -DestinationPath $zipName -Force
          }
          Compress-Archive -Path build.log -DestinationPath "build-log.zip" -Force
          Get-ChildItem *.zip -ErrorAction SilentlyContinue | ForEach-Object { log "  $($_.Name) ($($_.Length) bytes)" }

      - uses: softprops/action-gh-release@v1
        with:
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
