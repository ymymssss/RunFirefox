name: CI

on:
  push:
    branches: [master]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Setup AutoIt
        shell: pwsh
        run: |
          choco install autoit -y --no-progress
          echo "C:\Program Files (x86)\AutoIt3" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get the version
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#*\/v}" >> $GITHUB_OUTPUT

      - name: Build
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $autoitDir = "${env:ProgramFiles(x86)}\AutoIt3"
          $aut2exe = Get-ChildItem "$autoitDir\Aut2Exe\Aut2Exe.exe" -ErrorAction SilentlyContinue
          if (-not $aut2exe) {
            $aut2exe = Get-ChildItem $autoitDir -Recurse -Filter "Aut2Exe.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $aut2exe) { Write-Error "aut2exe not found!"; exit 1 }
          Write-Host "Using: $($aut2exe.FullName)"

          # Only build RunFirefox.au3 (skip generated icon scripts for now)
          $f = "RunFirefox.au3"
          $base = "RunFirefox"
          Write-Host "Building $f..."

          $out32 = "${base}.exe"
          $out64 = "${base}_x64.exe"

          # Try with icon
          $icon = "icons\Firefox.ico"
          if (Test-Path $icon) {
            Write-Host "  Icon found: $icon"
            & $aut2exe.FullName /in $f /out $out32 /x86 /unicode /icon $icon 2>&1
            Write-Host "  32-bit exit: $LASTEXITCODE, exists: $(Test-Path $out32), size: $(if (Test-Path $out32) { (Get-Item $out32).Length } else { 0 })"
            & $aut2exe.FullName /in $f /out $out64 /x64 /unicode /icon $icon 2>&1
            Write-Host "  64-bit exit: $LASTEXITCODE, exists: $(Test-Path $out64), size: $(if (Test-Path $out64) { (Get-Item $out64).Length } else { 0 })"
          } else {
            Write-Host "  No icon, building without"
            & $aut2exe.FullName /in $f /out $out32 /x86 /unicode 2>&1
            Write-Host "  32-bit exit: $LASTEXITCODE, exists: $(Test-Path $out32), size: $(if (Test-Path $out32) { (Get-Item $out32).Length } else { 0 })"
            & $aut2exe.FullName /in $f /out $out64 /x64 /unicode 2>&1
            Write-Host "  64-bit exit: $LASTEXITCODE, exists: $(Test-Path $out64), size: $(if (Test-Path $out64) { (Get-Item $out64).Length } else { 0 })"
          }

          # Package
          Write-Host "=== Packaging ==="
          $exeFiles = @(Get-ChildItem *.exe -ErrorAction SilentlyContinue)
          Write-Host "EXE files found: $($exeFiles.Count)"
          $exeFiles | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }

          foreach ($exe in $exeFiles) {
            $name = $exe.Name
            if ($name -match '^(.+)_x64\.exe$') {
              $zipName = "$($Matches[1])_${version}_x64.zip"
            } else {
              $baseName = $name -replace '\.exe$', ''
              $zipName = "${baseName}_${version}.zip"
            }
            Write-Host "Zip: $name -> $zipName"
            Compress-Archive -Path $name -DestinationPath $zipName -Force
          }

          Write-Host "=== Result ==="
          Get-ChildItem *.zip -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "$($_.Name) ($($_.Length) bytes)" }

      - uses: softprops/action-gh-release@v1
        with:
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
